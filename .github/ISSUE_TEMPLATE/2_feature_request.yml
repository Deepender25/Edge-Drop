name: ✨ Feature Request & Suggestions
description: Suggest an idea, new feature, or enhancement for Edge-Drop.
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature or workflow improvement? Let us know below!
  - type: textarea
    id: problem
    attributes:
      label: Problem or Pain Point
      description: Is your feature request related to a problem or workflow limitation? Please describe it.
      placeholder: I struggle when I try to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution or Feature Idea
      description: Describe what you would like Edge-Drop to do.
      placeholder: It would be great if Edge-Drop could...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context or Mockups
      description: Add any screenshots, mockups, or extra context to illustrate your idea.
